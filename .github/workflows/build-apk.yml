name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    
    - name: Get dependencies
      working-directory: client
      run: flutter pub get
    
    - name: Configure Android SDK
      working-directory: client
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Build debug APK
      working-directory: client
      run: flutter build apk --debug --verbose 2>&1 | tee build.log || true
    
    - name: Show errors
      if: failure()
      run: tail -n 100 build.log
    
    - name: Check output
      if: always()
      run: |
        ls -la client/build/app/outputs/flutter-apk/ || echo "APK not found"
    
    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: client/build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30
    
    - name: Upload to GitHub Release
      if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: client/build/app/outputs/flutter-apk/app-debug.apk
        tag_name: v${{ github.run_number }}
        generate_release_notes: true
