name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    
    - name: Remove existing Android files if any
      run: rm -rf android ios linux macos windows web
    
    - name: Initialize Flutter Project
      run: flutter create --project-name global_broadcast_app --platforms android .
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Configure Android SDK
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Build debug APK
      run: flutter build apk --debug
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: client/build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30
    
    - name: Upload to GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: client/build/app/outputs/flutter-apk/app-debug.apk
        tag_name: v${{ github.run_number }}
        generate_release_notes: true
