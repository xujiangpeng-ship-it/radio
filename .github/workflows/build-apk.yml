name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    
    - name: Initialize Flutter Project
      run: |
        # Create fresh Flutter project
        flutter create --project-name global_broadcast_app --platforms android /tmp/fresh_client
        
        # Copy lib files (keep existing pubspec.yaml)
        cp -r client/lib/* /tmp/fresh_client/lib/
        cp client/pubspec.yaml /tmp/fresh_client/pubspec.yaml
        
        # Verify and get dependencies
        cd /tmp/fresh_client
        flutter pub get
        
        # Configure Android SDK
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        # Build APK
        flutter build apk --debug
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: /tmp/fresh_client/build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30
    
    - name: Upload to GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: /tmp/fresh_client/build/app/outputs/flutter-apk/app-debug.apk
        tag_name: v${{ github.run_number }}
        generate_release_notes: true
