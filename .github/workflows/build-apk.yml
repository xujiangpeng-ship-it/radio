name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    
    - name: Initialize Flutter Project
      run: |
        # Create a temporary directory and initialize properly
        mkdir -p temp_flutter_client
        cd temp_flutter_client
        
        # Initialize fresh Flutter project
        flutter create --project-name global_broadcast_app --platforms android .
        
        # Copy our custom code into it
        cp -r ../client/lib/* ./lib/
        cat ../client/pubspec.yaml >> pubspec.yaml
        
        # Get dependencies
        flutter pub get
        
        # Configure Android SDK
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        
        # Build APK
        flutter build apk --debug
    
    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: temp_flutter_client/build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30
    
    - name: Upload to GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: temp_flutter_client/build/app/outputs/flutter-apk/app-debug.apk
        tag_name: v${{ github.run_number }}
        generate_release_notes: true
